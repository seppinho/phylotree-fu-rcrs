name: Build
on:
  push:
    tags:
      - '[0-9]+.[0-9]+*'
  pull_request:
permissions:
  contents: write

env:
  NAME: phylotree-fu-rcrs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build VERSION=${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ github.ref_name }}
          path: dist/${{ env.NAME }}-${{ github.ref_name }}.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "dist/${{ env.NAME }}-${{ github.ref_name }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
